<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아임반 네이버 SA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f9fb;
  --bg2: #ffffff;
  --bg3: #f0f2f5;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #1a1d23;
  --muted: #8a92a0;
  --meta: #3b7de9;
  --google: #e07b20;
  --ngfa: #00994a;
  --nsa: #0097b8;
  --nbsa: #7c5fc9;
  --kakao: #c4a800;
  --google_app: #d9720f;
  --up: #1a9e52;
  --down: #d93636;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px; }
.page-wrap { max-width: 1200px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 16px; }
.header h1 { font-family: 'Noto Sans KR', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.3px; }
.header p { font-family: 'Inter', sans-serif; font-size: 15px; color: var(--muted); margin-top: 4px; }
.date-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.preset-group { display: flex; gap: 4px; }
.date-btn { font-family: 'Inter', sans-serif; font-size: 12px; padding: 6px 13px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; }
.date-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.date-btn:hover:not(.active) { color: var(--text); border-color: var(--text); }
.date-input-wrap { display: flex; align-items: center; gap: 6px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 5px 10px; cursor: pointer; }
.date-input-wrap input[type=date] { font-family: 'Inter', sans-serif; font-size: 12px; border: none; background: transparent; color: var(--text); outline: none; cursor: pointer; color-scheme: light; }
.date-input-wrap input[type=date]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; filter: invert(0); }
.date-sep { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); }
.apply-btn { font-family: 'Inter', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 6px; border: none; background: var(--text); color: var(--bg); cursor: pointer; }
.apply-btn:hover { opacity: .75; }

/* Filters */
.filter-row { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
.sticky-filters {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding-top: 20px;
  padding-bottom: 8px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.filter-label { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; min-width: 36px; }
.tab-group { display: flex; gap: 4px; flex-wrap: wrap; }
.tab { display: flex; align-items: center; gap: 7px; padding: 7px 15px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
.tab .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.tab:hover:not(.active) { color: var(--text); border-color: var(--text); }

/* KPI grid */
.kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
.kpi-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; transition: border-color .15s; }
.kpi-card:hover { border-color: var(--border2); }
.kpi-label { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.kpi-value { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 500; letter-spacing: -0.5px; line-height: 1; font-variant-numeric: tabular-nums; }
.kpi-sub { display: flex; align-items: center; gap: 6px; margin-top: 7px; font-size: 11px; color: var(--muted); }
.badge { font-family: 'Inter', sans-serif; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.badge.up { background: rgba(109,223,154,.12); color: var(--up); }
.badge.down { background: rgba(240,96,96,.12); color: var(--down); }

/* Section title */
.section-title { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }

/* Breakdown */
.breakdown-grid { display: grid; gap: 10px; margin-bottom: 20px; }
.ch-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; position: relative; overflow: hidden; }
.ch-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.ch-card[data-ch="meta"]::before { background: var(--meta); }
.ch-card[data-ch="google"]::before { background: var(--google); }
.ch-card[data-ch="ngfa"]::before { background: var(--ngfa); }
.ch-card[data-ch="nsa"]::before { background: var(--nsa); }
.ch-card[data-ch="nbsa"]::before { background: var(--nbsa); }
.ch-card[data-ch="kakao"]::before { background: var(--kakao); }
.ch-card[data-ch="google_app"]::before { background: var(--google_app); }
.ch-name { font-size: 12px; font-weight: 500; margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
.ch-name .dot { width: 6px; height: 6px; border-radius: 50%; }
.ch-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ch-metric-label { font-family: 'Inter', sans-serif; font-size: 9px; color: var(--muted); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 3px; }
.ch-metric-value { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; }

/* Chart section */
.chart-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 22px; margin-bottom: 20px; position: relative; }
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.chart-title { font-size: 14px; font-weight: 500; }
.chart-legend { display: flex; gap: 14px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-family: 'Inter', sans-serif; font-size: 10px; color: var(--muted); }
.legend-dot { width: 6px; height: 6px; border-radius: 50%; }

/* Metric selector */
.metric-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.metric-btn { font-family: 'Inter', sans-serif; font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.metric-btn:hover:not(.m-disabled) { color: var(--text); }
.metric-btn.m-selected { color: var(--text); }
.metric-btn.m-disabled { opacity: .3; cursor: not-allowed; }
.mbullet { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; opacity: .5; }
.metric-btn.m-selected .mbullet { opacity: 1; }
.metric-hint { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--muted); margin-bottom: 14px; }

/* SVG line chart */
.lc-grid line { stroke: rgba(255,255,255,.05); stroke-width: 1; }
.lc-axis-text { font-family: 'Inter', sans-serif; font-size: 7px; fill: var(--muted); font-variant-numeric: tabular-nums; }
.lc-line { fill: none; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
.lc-dot { stroke-width: 2; cursor: pointer; }

/* Tooltip */
.tip { position: fixed; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 7px 11px; font-family: 'Inter', sans-serif; font-size: 11px; color: var(--text); pointer-events: none; opacity: 0; transition: opacity .12s; white-space: nowrap; z-index: 9999; }

/* ROAS section */
.roas-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.roas-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
.roas-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.roas-row:last-child { margin-bottom: 0; }
.roas-ch { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--muted); width: 52px; flex-shrink: 0; }
.roas-bar-wrap { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.roas-bar-fill { height: 100%; border-radius: 3px; transition: width .7s; }
.roas-val { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; width: 44px; text-align: right; flex-shrink: 0; }

/* Table */
.table-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: visible; margin-bottom: 16px; }
.table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 500; border-radius: 12px 12px 0 0; }
table { width: 100%; border-collapse: collapse; }
thead th { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; padding: 9px 14px; text-align: center; border-bottom: 1px solid var(--border); font-weight: 700; background: var(--bg3); transition: color .12s; }
thead th:first-child { text-align: center; }
thead th:hover:not(:first-child) { color: var(--text); }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 11px 14px; text-align: right; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; }
tbody td:first-child { text-align: left; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 500; color: var(--text); }
.ch-pill { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 2px 8px; border-radius: 4px; font-size: 11px; text-align: center; line-height: 1.3; }
.ch-pill.meta   { background: rgba(79,142,247,.15);  color: var(--meta); }
.ch-pill.google { background: rgba(244,160,68,.15);  color: var(--google); }
.ch-pill.ngfa   { background: rgba(3,199,90,.15);    color: var(--ngfa); }
.ch-pill.nsa    { background: rgba(0,180,216,.15);   color: var(--nsa); }
.ch-pill.nbsa   { background: rgba(167,139,250,.15); color: var(--nbsa); }
.ch-pill.kakao  { background: rgba(249,208,0,.15);   color: var(--kakao); }
.ch-pill.google_app { background: rgba(251,146,60,.15); color: var(--google_app); }

/* Column dropdown */
.col-dropdown-btn { font-family:'DM Mono',monospace; font-size:11px; padding:5px 12px; border-radius:6px; border:1px solid var(--border2); background:var(--bg3); color:var(--text); cursor:pointer; display:flex; align-items:center; gap:2px; white-space:nowrap; }
.col-dropdown-btn:hover { border-color:var(--text); }
.col-dropdown { position:absolute; right:0; top:calc(100% + 6px); background:var(--bg2); border:1px solid var(--border2); border-radius:10px; padding:8px; z-index:9999; min-width:160px; box-shadow:0 8px 24px rgba(0,0,0,.15); max-height:320px; overflow-y:auto; }
.col-item { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; font-family:'DM Mono',monospace; font-size:12px; color:var(--text); transition:background .1s; white-space:nowrap; }
.col-item:hover { background:var(--bg3); }
.col-check { width:14px; height:14px; border-radius:3px; border:1px solid var(--border2); background:transparent; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.col-item.col-active .col-check { background:var(--text); border-color:var(--text); }
.col-item.col-active .col-check::after { content:''; display:block; width:8px; height:5px; border-left:1.5px solid var(--bg); border-bottom:1.5px solid var(--bg); transform:rotate(-45deg) translate(1px,-1px); }
.col-item.col-disabled { opacity: .4; cursor: not-allowed; }
.col-item.col-disabled .col-check { opacity: .3; }

.kpi-card { animation: fadeUp .35s ease both; }
.kpi-card:nth-child(1){animation-delay:.03s} .kpi-card:nth-child(2){animation-delay:.06s}
.kpi-card:nth-child(3){animation-delay:.09s} .kpi-card:nth-child(4){animation-delay:.12s}
.kpi-card:nth-child(5){animation-delay:.15s} .kpi-card:nth-child(6){animation-delay:.18s}
.kpi-card:nth-child(7){animation-delay:.21s} .kpi-card:nth-child(8){animation-delay:.24s}
.kpi-card:nth-child(9){animation-delay:.27s} .kpi-card:nth-child(10){animation-delay:.30s}
.kpi-card:nth-child(11){animation-delay:.33s}


</style>
</head>

<div id="loadingBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:var(--bg2);border-bottom:1px solid var(--border2);padding:10px 32px;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">
  <div style="width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0"></div>

<div class="page-wrap">
<div class="sticky-filters">
<div class="header">

</div>









<div class="filter-row">

    <button class="tab active" data-ch="all" onclick="setCh(this)"><span class="dot" style="background:var(--text);opacity:.25"></span>전체</button>

</div>

</div>

<script>
var EMPTY = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0, app_installs:0};
var RAW = {

// 공통 캠페인 집계 헬퍼
function addToCampaign(obj, camp, dateStr, dateFrom, dateTo, cost, impr, click, conv, rev) {
  if (dateStr < dateFrom || dateStr > dateTo) return;
  if (!obj[camp]) obj[camp] = {name:camp, cost:0, impressions:0, clicks:0, conversions:0, revenue:0};
  obj[camp].cost        += cost;
  obj[camp].impressions += impr;
  obj[camp].clicks      += click;
  obj[camp].conversions += conv;
  obj[camp].revenue     += rev;
}

// 계층적 집계: {캠페인명: {data, groups: {그룹명: {data, creatives: {소재명: data}}}}}
function addToHierarchy(hier, camp, group, creative, dateStr, dateFrom, dateTo, cost, impr, click, conv, rev, cartConv, cartRev, appInstalls) {
  if (dateStr < dateFrom || dateStr > dateTo) return;
  cartConv = cartConv || 0; cartRev = cartRev || 0; appInstalls = appInstalls || 0;
  var empty = function(name) { return {name:name, cost:0, impressions:0, clicks:0, conversions:0, revenue:0, cart_conv:0, cart_rev:0, app_installs:0}; };
  if (!hier[camp]) hier[camp] = Object.assign(empty(camp), {groups:{}});
  hier[camp].cost += cost; hier[camp].impressions += impr; hier[camp].clicks += click; hier[camp].conversions += conv; hier[camp].revenue += rev; hier[camp].cart_conv += cartConv; hier[camp].cart_rev += cartRev; hier[camp].app_installs += appInstalls;
  if (group) {
    if (!hier[camp].groups[group]) hier[camp].groups[group] = Object.assign(empty(group), {creatives:{}});
    hier[camp].groups[group].cost += cost; hier[camp].groups[group].impressions += impr; hier[camp].groups[group].clicks += click; hier[camp].groups[group].conversions += conv; hier[camp].groups[group].revenue += rev; hier[camp].groups[group].cart_conv += cartConv; hier[camp].groups[group].cart_rev += cartRev; hier[camp].groups[group].app_installs += appInstalls;
    if (creative) {
      if (!hier[camp].groups[group].creatives[creative]) hier[camp].groups[group].creatives[creative] = empty(creative);
      hier[camp].groups[group].creatives[creative].cost += cost; hier[camp].groups[group].creatives[creative].impressions += impr; hier[camp].groups[group].creatives[creative].clicks += click; hier[camp].groups[group].creatives[creative].conversions += conv; hier[camp].groups[group].creatives[creative].revenue += rev; hier[camp].groups[group].creatives[creative].cart_conv += cartConv; hier[camp].groups[group].creatives[creative].cart_rev += cartRev; hier[camp].groups[group].creatives[creative].app_installs += appInstalls;
    }
  }
}

// CSV 한 줄 파싱 (따옴표 안 쉼표 처리)
function splitCSVLine(line) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim().replace(/^"|"$/g,'')); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim().replace(/^"|"$/g,''));
  return result;
}

// CSV 문자열 파싱 (따옴표 안 쉼표 처리)
function parseCSV(text) {
  // 셀 안 줄바꿈 제거
  var cleaned = '';
  var inQ = false;
  for (var ci = 0; ci < text.length; ci++) {
    var c = text[ci];
    if (c === '"') { inQ = !inQ; cleaned += c; }
    else if ((c === '\n' || c === '\r') && inQ) { cleaned += ' '; }
    else { cleaned += c; }
  }
  var lines = cleaned.trim().split('\n');
  var headers = splitCSVLine(lines[0]);
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var cols = splitCSVLine(lines[i]);
    if (cols.length < 2) continue;
    var row = {};
    for (var j = 0; j < headers.length; j++) row[headers[j]] = cols[j] || '';
    rows.push(row);
  }
  return rows;
}


// 아임반 전용 계층 집계 (캠페인유형으로 채널 분리)
function aggregateNSAHierarchyAimban(rows, dateFrom, dateTo, chKey) {
  var out = {};
  var CH_TYPE_MAP = {nsa:'파워링크', nbsa:'브랜드검색', ngfa:'쇼핑검색', kakao:'파워컨텐츠'};
  var targetType = CH_TYPE_MAP[chKey];
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var dateStr = (r['일자'] || '').slice(0, 10);
    if (!dateStr) continue;
    var tp = r['캠페인유형'] || '';
    var rowKey = tp === '브랜드검색' ? 'nbsa' : tp === '쇼핑검색' ? 'ngfa' : tp === '파워컨텐츠' ? 'kakao' : 'nsa';
    if (chKey !== 'all' && rowKey !== chKey) continue;
    addToHierarchy(out, r['캠페인명']||'(미분류)', r['광고그룹명']||'', null, dateStr, dateFrom, dateTo,
      Number(r['총비용(vat-)'])||0, Number(r['노출수'])||0, Number(r['클릭수'])||0,
      Number(r['구매완료 전환수'])||0, Number(r['구매완료 매출액'])||0,
      Number(r['장바구니 전환수'])||0, Number(r['장바구니 매출액'])||0);
  }
  return out;
}

// CSV 행 → 날짜별 합산 (네이버SA) → {nsa, nbsa} 분리
// CSV 행 → 날짜별 합산 (구글DA, mode: 'official' | 'app')
// byDate 객체 → 날짜 범위 합산 → {cost,...}
function sumByDateRange(byDate, dateFrom, dateTo) {
  var out = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0, app_installs:0};
  var keys = Object.keys(byDate);
  for (var i = 0; i < keys.length; i++) {
    var d = keys[i];
    if (d < dateFrom || d > dateTo) continue;
    out.cost        += byDate[d].cost;
    out.revenue     += byDate[d].revenue;
    out.clicks      += byDate[d].clicks;
    out.impressions += byDate[d].impressions;
    out.conversions   += byDate[d].conversions;
    out.app_installs  += byDate[d].app_installs || 0;
  }
  return out;
}

// 하이퍼 네이버DA(GFA): 캠페인명으로 브랜드 구분

function loadAimban(callback) {
  if (sheetsCache.aimban) { callback(sheetsCache.aimban); return; }
  showLoading(true);
  fetch(CSV_URLS_AIMBAN.nsa)
    .then(function(r){ return r.text(); })
    .then(function(text) {
      var rows = parseCSV(text);
      // 캠페인유형별로 분리: 파워링크=nsa, 브랜드검색=nbsa, 쇼핑검색=ngfa, 파워컨텐츠=kakao
      var byType = {nsa:{}, nbsa:{}, ngfa:{}, kakao:{}};
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        var dateStr = (r['일자'] || '').slice(0, 10);
        if (!dateStr) continue;
        var tp = r['캠페인유형'] || '';
        var key = tp === '브랜드검색' ? 'nbsa'
                : tp === '쇼핑검색'   ? 'ngfa'
                : tp === '파워컨텐츠' ? 'kakao'
                : 'nsa';
        if (!byType[key][dateStr]) byType[key][dateStr] = {date:dateStr, cost:0, impressions:0, clicks:0, conversions:0, revenue:0};
        byType[key][dateStr].cost        += Number(r['총비용(vat-)'])      || 0;
        byType[key][dateStr].impressions += Number(r['노출수'])             || 0;
        byType[key][dateStr].clicks      += Number(r['클릭수'])             || 0;
        byType[key][dateStr].conversions += Number(r['구매완료 전환수'])     || 0;
        byType[key][dateStr].revenue     += Number(r['구매완료 매출액'])     || 0;
      }
      var parsed = {nsa: byType.nsa, nbsa: byType.nbsa, ngfa: byType.ngfa, kakao: byType.kakao, _rawNSA: rows};
      sheetsCache.aimban = parsed;
      buildProductTabs(rows);
      showLoading(false);
      callback(parsed);
    })
    .catch(function(err) {
      showLoading(false);
      console.error('아임반 Sheets 로드 실패:', err);
      callback(null);
    });
}

function applyAimban(apiData, dateFrom, dateTo) {
  if (!apiData) return;
  var prevRange = getPrevRange(dateFrom, dateTo);
  var CHS_AIMBAN = ['nsa', 'nbsa', 'ngfa', 'kakao'];
  // 제품 필터 적용
  var rows = apiData._rawNSA || [];
  var filteredRows;
  var GROUP_KEY_MAP = {'main': '메인제품', 'etc': '기타제품', 'common': null};
  if (S.productGroup) {
    var groupLabel = GROUP_KEY_MAP[S.productGroup];
    if (S.productGroup === 'common') {
      // 공통: PRODUCT_GROUPS['공통'] + 미분류
      var allGrouped = PRODUCT_GROUPS['메인제품'].concat(PRODUCT_GROUPS['기타제품']).concat(PRODUCT_GROUPS['공통']);
      filteredRows = rows.filter(function(r){
        var p = (r['제품']||'').trim();
        return PRODUCT_GROUPS['공통'].indexOf(p) !== -1 || allGrouped.indexOf(p) === -1;
      });
    } else {
      var groupProds = PRODUCT_GROUPS[groupLabel] || [];
      filteredRows = rows.filter(function(r){ return groupProds.indexOf((r['제품']||'').trim()) !== -1; });
    }
  } else if (S.product === 'all') {
    filteredRows = rows;
  } else {
    filteredRows = rows.filter(function(r){ return (r['제품']||'').trim() === S.product; });
  }

  // 필터된 rows로 byDate 재집계
  function aggregateByType(frows) {
    var byType = {nsa:{}, nbsa:{}, ngfa:{}, kakao:{}};
    for (var i = 0; i < frows.length; i++) {
      var r = frows[i];
      var dateStr = (r['일자'] || '').slice(0, 10);
      if (!dateStr) continue;
      var tp = r['캠페인유형'] || '';
      var key = tp === '브랜드검색' ? 'nbsa' : tp === '쇼핑검색' ? 'ngfa' : tp === '파워컨텐츠' ? 'kakao' : 'nsa';
      if (!byType[key][dateStr]) byType[key][dateStr] = {date:dateStr, cost:0, impressions:0, clicks:0, conversions:0, revenue:0};
      byType[key][dateStr].cost        += Number(r['총비용(vat-)'])      || 0;
      byType[key][dateStr].impressions += Number(r['노출수'])             || 0;
      byType[key][dateStr].clicks      += Number(r['클릭수'])             || 0;
      byType[key][dateStr].conversions += Number(r['구매완료 전환수'])     || 0;
      byType[key][dateStr].revenue     += Number(r['구매완료 매출액'])     || 0;
    }
    return byType;
  }

  var byType     = aggregateByType(filteredRows);
  var filteredData = {nsa: byType.nsa, nbsa: byType.nbsa, ngfa: byType.ngfa, kakao: byType.kakao, _rawNSA: filteredRows};

  RAW.aimban  = {};
  PREV.aimban = {};
  for (var i = 0; i < CHS_AIMBAN.length; i++) {
    var ch = CHS_AIMBAN[i];
    RAW.aimban[ch]  = sumByDateRange(filteredData[ch] || {}, dateFrom,       dateTo);
    PREV.aimban[ch] = sumByDateRange(filteredData[ch] || {}, prevRange.from, prevRange.to);
  }
  // 캠페인 테이블용 필터된 raw 저장
  sheetsCache.aimban._filteredNSA = filteredRows;
}

// ── 코멘트 기능 ────────────────────────────────────────────────────────────────
function getPrevRange(dateFrom, dateTo) {
  var f = new Date(dateFrom), t = new Date(dateTo);
  var diff = t - f;
  var prevTo   = new Date(f - 1);
  var prevFrom = new Date(f - diff - 86400000);
  return { from: prevFrom.toISOString().slice(0,10), to: prevTo.toISOString().slice(0,10) };
}

var PREV = {};
(function() {
  var brands = Object.keys(RAW);
  for (var bi = 0; bi < brands.length; bi++) {
    var b = brands[bi];
    PREV[b] = {};
    var chs = Object.keys(RAW[b]);
    for (var ci = 0; ci < chs.length; ci++) {
      var c = chs[ci];
      var d = RAW[b][c];
      PREV[b][c] = {
        cost: Math.round(d.cost * 0.88),
        revenue: Math.round(d.revenue * 0.84),
        clicks: Math.round(d.clicks * 0.87),
        impressions: Math.round(d.impressions * 0.89),
        conversions: Math.round(d.conversions * 0.82)
      };
    }
  }
})();

// 브랜드 × 채널 × 날짜별 1일 데이터 반환
function getDayData(brKey, chKey, dateStr) {
  var empty = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0};
  if (sheetsCache.aimban) {
    var byDateA = sheetsCache.aimban[chKey];
    if (byDateA && byDateA[dateStr]) return byDateA[dateStr];
    if (byDateA) return empty;
  }
  return empty;
}

function brandKeys() {
  return ['aimban'];

function chKeys() {
  if (S.ch.indexOf('all') !== -1) return CHS;
  return S.ch.length > 0 ? S.ch : CHS;
}

function sumData(bk, ck, dataset) {
  var out = {};
  for (var ci = 0; ci < ck.length; ci++) {
    var c = ck[ci];
    out[c] = {cost: 0, revenue: 0, clicks: 0, impressions: 0, conversions: 0, app_installs: 0};
    for (var bi = 0; bi < bk.length; bi++) {
      var b = bk[bi];
      if (!dataset[b] || !dataset[b][c]) continue;
      var d = dataset[b][c];
      out[c].cost         += d.cost;
      out[c].revenue      += d.revenue;
      out[c].clicks       += d.clicks;
      out[c].impressions  += d.impressions;
      out[c].conversions  += d.conversions;
      out[c].app_installs += d.app_installs || 0;
    }
  }
  return out;
}

function calc(d) {
  var installs = d.app_installs || 0;
  return {
    cost:         d.cost,
    revenue:      d.revenue,
    roas:         d.revenue / d.cost,
    cvr:          d.conversions / d.clicks,
    clicks:       d.clicks,
    cpc:          d.cost / d.clicks,
    ctr:          d.clicks / d.impressions,
    impressions:  d.impressions,
    cpm:          d.cost / d.impressions * 1000,
    conversions:  d.conversions,
    cpa:          d.conversions > 0 ? d.cost / d.conversions : 0,
    app_installs: installs,
    cpi:          installs > 0 ? d.cost / installs : 0,
    install_rate: d.clicks > 0 ? installs / d.clicks : 0
  };
}

function aggCalc(map) {
  var s = {cost: 0, revenue: 0, clicks: 0, impressions: 0, conversions: 0, app_installs: 0};
  var keys = Object.keys(map);
  for (var i = 0; i < keys.length; i++) {
    var d = map[keys[i]];
    s.cost         += d.cost;
    s.revenue      += d.revenue;
    s.clicks       += d.clicks;
    s.impressions  += d.impressions;
    s.conversions  += d.conversions;
    s.app_installs += d.app_installs || 0;
  }
  var result = calc(s);
  result.cpa = s.conversions > 0 ? s.cost / s.conversions : 0;
  result.cpi = s.app_installs > 0 ? s.cost / s.app_installs : 0;
  return result;
}

function fmt(n, t) {
  if (t === 'won')  return '₩' + Math.round(n).toLocaleString('ko-KR');
  if (t === 'pct')  return (n * 100).toFixed(2) + '%';
  if (t === 'roas') return (n * 100).toFixed(0) + '%';
  if (t === 'x')    return n.toFixed(2) + 'x';
  if (t === 'num')  return Math.round(n).toLocaleString('ko-KR');
  if (t === 'cpc')  return '₩' + Math.round(n).toLocaleString('ko-KR');
  return String(n);
}

function renderKPIs(cm, pm) {
  var ca = aggCalc(cm);
  var pa = aggCalc(pm);
  var brand = getActiveBrand();
  var override = brand ? BRAND_OVERRIDES[brand] : null;

  // 사용할 KPI 목록 결정 (kpiOrder 있으면 해당 순서 사용)
  var kpiList;
  if (override && override.kpiOrder) {
    var kpiMap = {};
    for (var mi = 0; mi < KPIS.length; mi++) kpiMap[KPIS[mi].key] = KPIS[mi];
    kpiList = [];
    for (var oi = 0; oi < override.kpiOrder.length; oi++) {
      if (kpiMap[override.kpiOrder[oi]]) kpiList.push(kpiMap[override.kpiOrder[oi]]);
    }
  } else {
    kpiList = KPIS.filter(function(k) {
      return !(override && override.excludeCols && override.excludeCols.indexOf(k.key) !== -1);
    });
  }

  // 그리드 열 수: 5열 기준, 커리어벗은 9개 → 5+4
  var colCount = override && override.kpiOrder ? 5 : 6;
  document.getElementById('kpiGrid').style.gridTemplateColumns = 'repeat(' + colCount + ', 1fr)';

  var html = '';
  for (var i = 0; i < kpiList.length; i++) {
    var k = kpiList[i];
    var label   = (override && override.labelOverrides && override.labelOverrides[k.key]) ? override.labelOverrides[k.key] : k.label;
    var dataKey = (override && override.keyOverrides  && override.keyOverrides[k.key])   ? override.keyOverrides[k.key]   : k.key;
    var v = ca[dataKey];
    var p = pa[dataKey];
    var diff = v - p;
    var isUp = diff >= 0;
    var isCostMetric = (dataKey === 'cost' || dataKey === 'cpc' || dataKey === 'cpm' || dataKey === 'cpa' || dataKey === 'cpi');
    var isGood = isCostMetric ? !isUp : isUp;
    var diffLabel = (isUp ? '+' : '') + fmt(diff, k.type);
    html += '<div class="kpi-card">';
    html += '<div class="kpi-label">' + label + '</div>';
    html += '<div class="kpi-value">' + fmt(v, k.type) + '</div>';
    html += '<div class="kpi-sub">';
    html += '<span class="badge ' + (isGood ? 'up' : 'down') + '">' + diffLabel + '</span>';
    html += '<span style="color:var(--text);opacity:.55;letter-spacing:0.03em">' + fmt(p, k.type) + '</span>';
    html += '</div></div>';
  }
  document.getElementById('kpiGrid').innerHTML = html;
}

function buildMetricSelector() {
  var brand = getActiveBrand();
  var override = brand ? BRAND_OVERRIDES[brand] : null;
  // auto-remove excluded metrics from selection
  if (override && override.excludeCols) {
    for (var xi = 0; xi < override.excludeCols.length; xi++) {
      var exKey = override.excludeCols[xi];
      var exIdx = selectedMetrics.indexOf(exKey);
      if (exIdx !== -1) selectedMetrics.splice(exIdx, 1);
    }
    if (selectedMetrics.length === 0) selectedMetrics = ['cost'];
  }
  var html = '';
  for (var i = 0; i < CHART_METRICS.length; i++) {
    var m = CHART_METRICS[i];
    var isExcluded = override && override.excludeCols && override.excludeCols.indexOf(m.key) !== -1;
    if (isExcluded) continue;
    var label = (override && override.labelOverrides && override.labelOverrides[m.key]) ? override.labelOverrides[m.key] : m.label;
    var isSel = selectedMetrics.indexOf(m.key) !== -1;
    var isDis = !isSel && selectedMetrics.length >= 3;
    var cls = 'metric-btn' + (isSel ? ' m-selected' : '') + (isDis ? ' m-disabled' : '');
    var style = isSel ? 'background:' + m.color + '20;border-color:' + m.color + ';' : '';
    html += '<button class="' + cls + '" style="' + style + '" onclick="toggleMetric(\'' + m.key + '\')">';

  } else {
    hint.textContent = '최대 3개 지표 선택 가능 (현재 ' + selectedMetrics.length + '개)';
  }
}

function toggleMetric(key) {
  var idx = selectedMetrics.indexOf(key);
  if (idx !== -1) {
    if (selectedMetrics.length === 1) return;
    selectedMetrics.splice(idx, 1);
  } else {
    if (selectedMetrics.length >= 3) return;
    selectedMetrics.push(key);
  }
  buildMetricSelector();
  var bk = brandKeys();
  var ck = chKeys();
  var cm = sumData(bk, ck, RAW);
  renderChart(cm, ck);
}

function renderChart(cm, ck) {
  var brand = getActiveBrand();
  var override = brand ? BRAND_OVERRIDES[brand] : null;
  var activeMets = [];
  for (var i = 0; i < CHART_METRICS.length; i++) {
    if (selectedMetrics.indexOf(CHART_METRICS[i].key) !== -1) {
      var m = CHART_METRICS[i];
      var label = (override && override.labelOverrides && override.labelOverrides[m.key]) ? override.labelOverrides[m.key] : m.label;
      activeMets.push({key: m.key, label: label, type: m.type, color: m.color});
    }
  }

  // Legend
  var legHtml = '';
  for (var i = 0; i < activeMets.length; i++) {
    legHtml += '<div class="legend-item"><div class="legend-dot" style="background:' + activeMets[i].color + '"></div>' + activeMets[i].label + '</div>';
  }
  if (prevWeekMode) {
    legHtml += '<div class="legend-item" style="opacity:.6"><div style="width:16px;height:1px;border-top:2px dashed #aaa;margin-right:6px"></div>동기간</div>';
  }
  document.getElementById('chartLegend').innerHTML = legHtml;

  // 날짜 범위에서 일별 날짜 배열 생성
  var dateFrom = document.getElementById('dateFrom').value;
  var dateTo   = document.getElementById('dateTo').value;
  var DAYS = [];
  var d = new Date(dateFrom);
  var dEnd = new Date(dateTo);
  while (d <= dEnd) {
    var mm = d.getMonth() + 1;
    var dd = d.getDate();
    DAYS.push(mm + '/' + dd);
    d.setDate(d.getDate() + 1);
  }

  // Build daily series per metric (실제 날짜별 raw 데이터에서 합산)
  var series = [];
  for (var mi = 0; mi < activeMets.length; mi++) {
    var metKey = activeMets[mi].key;
    var vals = [];
    for (var di = 0; di < DAYS.length; di++) {
      var dStr = new Date(dateFrom);
      dStr.setDate(dStr.getDate() + di);
      var dKey = dStr.toISOString().slice(0, 10);

      var s = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0};
      for (var ci = 0; ci < ck.length; ci++) {
        var chKey = ck[ci];
        var bk2 = brandKeys();
        for (var bi2 = 0; bi2 < bk2.length; bi2++) {
          var brKey = bk2[bi2];
          var dayData = getDayData(brKey, chKey, dKey);
          s.cost        += dayData.cost;
          s.revenue     += dayData.revenue;
          s.clicks      += dayData.clicks;
          s.impressions += dayData.impressions;
          s.conversions += dayData.conversions;
        }
      }
      vals.push(calc(s)[metKey] || 0);
    }
    series.push({meta: activeMets[mi], values: vals, isPrev: false});
  }

  // 전주 비교 시리즈 추가
  if (prevWeekMode) {
    var prevDays = [];
    for (var di = 0; di < DAYS.length; di++) {
      var pd = new Date(dateFrom);
      pd.setDate(pd.getDate() + di - 7);
      prevDays.push(pd.toISOString().slice(0, 10));
    }
    for (var mi = 0; mi < activeMets.length; mi++) {
      var metKey2 = activeMets[mi].key;
      var pvals = [];
      for (var di = 0; di < prevDays.length; di++) {
        var ps = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0};
        for (var ci = 0; ci < ck.length; ci++) {
          var chKey2 = ck[ci];
          var bk3 = brandKeys();
          for (var bi3 = 0; bi3 < bk3.length; bi3++) {
            var dayData2 = getDayData(bk3[bi3], chKey2, prevDays[di]);
            ps.cost        += dayData2.cost;
            ps.revenue     += dayData2.revenue;
            ps.clicks      += dayData2.clicks;
            ps.impressions += dayData2.impressions;
            ps.conversions += dayData2.conversions;
          }
        }
        pvals.push(calc(ps)[metKey2] || 0);
      }
      series.push({
        meta: {key: activeMets[mi].key, label: '전주 ' + activeMets[mi].label, type: activeMets[mi].type, color: 'rgba(160,160,160,0.7)'},
        values: pvals,
        isPrev: true
      });
    }
  }

  // 지표 타입 분류 (전주 제외하고 현재 데이터만 Y축 기준)
  var PCT_TYPES  = ['pct', 'roas'];
  var curSeries   = series.filter(function(s){ return !s.isPrev; });
  var leftSeries  = curSeries.filter(function(s){ return PCT_TYPES.indexOf(s.meta.type) === -1; });
  var rightSeries = curSeries.filter(function(s){ return PCT_TYPES.indexOf(s.meta.type) !== -1; });

  // Y축 범위 계산
  function seriesMinMax(arr) {
    var mn = Infinity, mx = -Infinity;
    for (var i = 0; i < arr.length; i++) {
      for (var j = 0; j < arr[i].values.length; j++) {
        if (arr[i].values[j] < mn) mn = arr[i].values[j];
        if (arr[i].values[j] > mx) mx = arr[i].values[j];
      }
    }
    return {min: mn === Infinity ? 0 : mn, max: mx === -Infinity ? 1 : mx};
  }
  function niceMax(v) {
    if (v === 0) return 1;
    var mag = Math.pow(10, Math.floor(Math.log(v) / Math.LN10));
    return Math.ceil(v / mag) * mag;
  }

  var lRange = leftSeries.length  ? seriesMinMax(leftSeries)  : null;
  var rRange = rightSeries.length ? seriesMinMax(rightSeries) : null;
  var lMax = lRange ? niceMax(lRange.max) : 0;
  var rMax = rRange ? niceMax(rRange.max) : 0;

  // 각 시리즈 정규화 (각자의 축 기준)
  var normed = [];
  for (var i = 0; i < series.length; i++) {
    var vs = series[i].values;
    var isPct = PCT_TYPES.indexOf(series[i].meta.type) !== -1;
    var axMax = isPct ? rMax : lMax;
    var n = [];
    for (var j = 0; j < vs.length; j++) n.push(axMax > 0 ? vs[j] / axMax : 0);
    normed.push(n);
  }

  var N = DAYS.length;
  var W = 620, H = 200;
  var PL = lRange ? 64 : 16;
  var PR = rRange ? 56 : 16;
  var PT = 14, PB = 28;
  var cW = W - PL - PR;
  var cH = H - PT - PB;

  function xp(i) { return N > 1 ? PL + (i / (N - 1)) * cW : PL + cW / 2; }
  function yp(n) { return PT + (1 - Math.min(n, 1)) * cH; }

  // Y축 눈금 포맷
  function fmtAxis(v, type) {
    if (type === 'pct') return (v * 100).toFixed(1) + '%';
    if (type === 'roas') return (v * 100).toFixed(0) + '%';
    return Math.round(v).toLocaleString('ko-KR');
  }

  var svg = '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="overflow:visible;display:block">';

  // Grid + Y축 눈금
  svg += '<g>';
  var TICKS = 4;
  for (var g = 0; g <= TICKS; g++) {
    var gy = PT + (g / TICKS) * cH;
    svg += '<line x1="' + PL + '" y1="' + gy + '" x2="' + (W - PR) + '" y2="' + gy + '" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>';
    var ratio = 1 - g / TICKS;
    // 왼쪽 Y축
    if (lRange) {
      var lVal = ratio * lMax;
      var lType = leftSeries.length ? leftSeries[0].meta.type : 'num';
      svg += '<text x="' + (PL - 6) + '" y="' + (gy + 4) + '" text-anchor="end" class="lc-axis-text" style="fill:rgba(0,0,0,0.65);font-size:7px">' + fmtAxis(lVal, lType) + '</text>';
    }
    // 오른쪽 Y축
    if (rRange) {
      var rVal = ratio * rMax;
      var rType = rightSeries.length ? rightSeries[0].meta.type : 'pct';
      svg += '<text x="' + (W - PR + 6) + '" y="' + (gy + 4) + '" text-anchor="start" class="lc-axis-text" style="fill:rgba(0,0,0,0.65);font-size:7px">' + fmtAxis(rVal, rType) + '</text>';
    }
  }
  svg += '</g>';

  // X 날짜 레이블 (날짜 수에 따라 간격 조정)
  var step = N <= 14 ? 1 : N <= 31 ? Math.ceil(N / 8) : Math.ceil(N / 10);
  for (var i = 0; i < DAYS.length; i++) {
    if (i % step !== 0 && i !== DAYS.length - 1) continue;
    svg += '<text x="' + xp(i) + '" y="' + (H - 4) + '" text-anchor="middle" class="lc-axis-text">' + DAYS[i] + '</text>';
  }

  // Series
  for (var si = 0; si < series.length; si++) {
    var col = series[si].meta.color;
    var pts = normed[si];
    var coords = [];
    for (var i = 0; i < N; i++) coords.push([xp(i), yp(pts[i])]);
    var isPrevSeries = series[si].isPrev;

    // Area (전주는 없음)
    if (!isPrevSeries) {
      var aD = 'M ' + coords[0][0] + ' ' + yp(0);
      for (var i = 0; i < N; i++) aD += ' L ' + coords[i][0] + ' ' + coords[i][1];
      aD += ' L ' + coords[N-1][0] + ' ' + yp(0) + ' Z';
      svg += '<path d="' + aD + '" fill="' + col + '" opacity="0.08"/>';
    }

    // Line (직선)
    var lD = 'M ' + coords[0][0] + ' ' + coords[0][1];
    for (var i = 1; i < N; i++) {
      lD += ' L ' + coords[i][0] + ' ' + coords[i][1];
    }
    var dashAttr = isPrevSeries ? ' stroke-dasharray="4,3"' : '';
    svg += '<path d="' + lD + '" fill="none" stroke="' + col + '" stroke-width="0.5"' + dashAttr + ' stroke-linejoin="round" stroke-linecap="round"/>';

    // Dots
    var showDots = N <= 31;
    var mLabel = series[si].meta.label;
    var mType  = series[si].meta.type;
    var mVals  = series[si].values;
    for (var i = 0; i < N; i++) {
      var tipTxt = (mLabel + ': ' + fmt(mVals[i], mType) + ' (' + DAYS[i] + ')').replace(/'/g, '&#39;');
      if (showDots) {
        svg += '<circle cx="' + coords[i][0] + '" cy="' + coords[i][1] + '" r="3" fill="' + col + '" stroke="#ffffff" stroke-width="1.5" style="cursor:pointer" onmouseenter="showTip(event,\'' + tipTxt + '\')" onmouseleave="hideTip()"/>';
      } else {
        svg += '<circle cx="' + coords[i][0] + '" cy="' + coords[i][1] + '" r="6" fill="transparent" style="cursor:pointer" onmouseenter="showTip(event,\'' + tipTxt + '\')" onmouseleave="hideTip()"/>';
      }
    }
  }

  svg += '</svg>';
  document.getElementById('lineChartWrap').innerHTML = svg;
}

function getEffectiveCols() {

  var override = brand ? BRAND_OVERRIDES[brand] : null;
  return TABLE_COLS.filter(function(c) {

  }).map(function(c) {

      return {key: c.key, label: override.labelOverrides[c.key], type: c.type};

}

function calcExtended(d) {
  var base = calc(d);
  base.cart_conv    = d.cart_conv || 0;
  base.cart_rev     = d.cart_rev  || 0;
  base.total_conv   = (d.conversions || 0) + (d.cart_conv || 0);
  base.total_rev    = (d.revenue    || 0) + (d.cart_rev  || 0);
  base.total_cpa    = base.total_conv > 0 ? Math.round(d.cost / base.total_conv) : 0;
  return base;
}

function buildColDropdown() {
  var brand = getActiveBrand();
  var override = brand ? BRAND_OVERRIDES[brand] : null;
  var html = '';
  for (var i = 0; i < TABLE_COLS.length; i++) {
    var col = TABLE_COLS[i];
    var isExcluded = override && override.excludeCols && override.excludeCols.indexOf(col.key) !== -1;
    var label = (override && override.labelOverrides && override.labelOverrides[col.key]) ? override.labelOverrides[col.key] : col.label;
    var active = selectedCols.indexOf(col.key) !== -1;
    var cls = 'col-item' + (active ? ' col-active' : '') + (isExcluded ? ' col-disabled' : '');
    var title = isExcluded ? ' title="' + S.brand + ' 브랜드에서 사용 안 함"' : '';
    html += '<div class="' + cls + '"' + title + ' onclick="event.stopPropagation();' + (isExcluded ? '' : 'toggleCol(\'' + col.key + '\')') + '">';
    html += '<div class="col-check"></div>' + label + (isExcluded ? ' <span style="opacity:.4;font-size:10px">제외</span>' : '') + '</div>';
  }
  document.getElementById('colDropdown').innerHTML = html;
  var visibleCount = getEffectiveCols().length;
  document.getElementById('colCount').textContent = '(' + visibleCount + ')';
}

function renderTable(cm, ck) {
  var activeCols = getEffectiveCols();

  // thead
  var headHtml = '<th style="cursor:default">캠페인유형</th>';
  for (var i = 0; i < activeCols.length; i++) {
    var col = activeCols[i];
    var isSort = tableSort.key === col.key;
    var arrow = isSort ? (tableSort.asc ? ' ↑' : ' ↓') : ' <span style="opacity:.25">↕</span>';
    headHtml += '<th style="cursor:pointer;user-select:none" onclick="sortTable(\'' + col.key + '\')">' + col.label + arrow + '</th>';
  }
  document.getElementById('tableHead').innerHTML = headHtml;

  // build rows
  var rows = [];
  for (var i = 0; i < ck.length; i++) {
    var c = ck[i];
    var d = calcExtended(cm[c]);
    rows.push({ch: c, data: d});
  }

  // sort
  if (tableSort.key) {
    var sk = tableSort.key;
    var asc = tableSort.asc;
    rows.sort(function(a, b) {
      var av = a.data[sk] || 0;
      var bv = b.data[sk] || 0;
      return asc ? av - bv : bv - av;
    });
  }

  // tbody
  var html = '';
  var total = {cost:0, revenue:0, clicks:0, impressions:0, conversions:0};
  var visibleRows = [];

  for (var i = 0; i < rows.length; i++) {
    var d = rows[i].data;
    if ((d.impressions || 0) === 0 && (d.conversions || 0) === 0) continue;
    visibleRows.push(rows[i]);
    total.cost        += d.cost        || 0;
    total.revenue     += d.revenue     || 0;
    total.clicks      += d.clicks      || 0;
    total.impressions += d.impressions || 0;
    total.conversions += d.conversions || 0;
  }

  // 이전 동기간 데이터
  var pm2 = null;
  if (tablePrevMode) {
    var bk2 = brandKeys();
    pm2 = sumData(bk2, ck, PREV);
  }

  for (var i = 0; i < visibleRows.length; i++) {
    var c = visibleRows[i].ch;
    var d = visibleRows[i].data;
    html += '<tr style="border-bottom:' + (tablePrevMode ? 'none' : '1px solid var(--border)') + '"><td><span class="ch-pill ' + c + '">' + CH_NAME[c] + '</span></td>';
    for (var j = 0; j < activeCols.length; j++) {
      var col = activeCols[j];
      html += '<td>' + fmt(d[col.key], col.type) + '</td>';
    }
    html += '</tr>';

    // 이전 동기간 서브 행
    if (tablePrevMode && pm2) {
      var pd = calcExtended(pm2[c] || {cost:0,revenue:0,clicks:0,impressions:0,conversions:0});
      html += '<tr style="border-bottom:1px solid var(--border);background:rgba(59,125,246,0.07)">';
      html += '<td style="padding:3px 14px 6px 18px;font-size:10px;color:#3b7de9;font-weight:500;font-family:\'Noto Sans KR\',sans-serif">↳ 이전 동기간</td>';
      for (var j = 0; j < activeCols.length; j++) {
        var col = activeCols[j];
        html += '<td style="padding:3px 14px 6px;font-size:11px;color:#374151;font-family:\'Inter\',sans-serif;font-variant-numeric:tabular-nums;text-align:right">' + fmt(pd[col.key], col.type) + changeArrow(d[col.key], pd[col.key], col.type) + '</td>';
      }
      html += '</tr>';
    }
  }

  // 합계 행
  if (visibleRows.length > 1) {
    var tc = calc(total);
    html += '<tr style="border-top:2px solid var(--border2);background:var(--bg3)">';
    html += '<td style="font-weight:600;font-family:\'Noto Sans KR\',sans-serif;font-size:12px">합계</td>';
    for (var j = 0; j < activeCols.length; j++) {
      var col = activeCols[j];
      html += '<td style="font-weight:600">' + fmt(tc[col.key], col.type) + '</td>';
    }
    html += '</tr>';
  }

  document.getElementById('tbody').innerHTML = html;
}

    {key:'cart_rev',    label:'장바구니매출', type:'won'},
    {key:'total_conv',  label:'총전환수',    type:'num'},
    {key:'total_rev',   label:'총매출',      type:'won'},
    {key:'total_cpa',   label:'총CPA',       type:'cpc'}

  // 헤더
  var thBase = 'padding:9px 14px;font-family:\'Inter\',sans-serif;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border2);background:var(--bg3);white-space:nowrap;cursor:pointer;user-select:none';

  headHtml += '<th style="' + thBase + ';text-align:center;width:52px;cursor:default">메모</th>';
  document.getElementById('campTableHead').innerHTML = headHtml;

  var multiCh = activeChs.length > 1;
  var colSpan = CAMP_COLS.length + EXTRA_COLS.length + 2 + (multiCh ? 1 : 0);

function sortTable(key) {
  if (tableSort.key === key) {
    tableSort.asc = !tableSort.asc;
  } else {
    tableSort.key = key;
    tableSort.asc = false;
  }
  var bk = brandKeys(), ck = chKeys();
  var cm = sumData(bk, ck, RAW);
  renderTable(cm, ck);
}

function syncCampScrollbar() {
  requestAnimationFrame(function() {
    var wrap  = document.getElementById('campTableWrap');
    var bar   = document.getElementById('campScrollbar');
    var inner = document.getElementById('campScrollbarInner');
    var tbl   = document.getElementById('campTable');
    if (!wrap || !bar || !inner || !tbl) return;

    // 스크롤바 너비 = 테이블 실제 너비
    inner.style.width = tbl.scrollWidth + 'px';
    bar.style.width   = wrap.clientWidth + 'px';

    // 테이블과 스크롤바 가로 스크롤 동기화
    var syncing = false;
    wrap.onscroll = function() {
      if (syncing) return; syncing = true;
      bar.scrollLeft = wrap.scrollLeft;
      syncing = false;
    };
    bar.onscroll = function() {
      if (syncing) return; syncing = true;
      wrap.scrollLeft = bar.scrollLeft;
      syncing = false;
    };

    // window scroll 시 스크롤바를 화면 하단에 고정
    function updateBarPosition() {
      var wrapRect = wrap.getBoundingClientRect();
      var vh = window.innerHeight;
      // 테이블이 화면에 걸쳐있을 때만 표시
      if (wrapRect.top < vh && wrapRect.bottom > 0 && wrapRect.bottom > vh) {
        // 화면 아래로 잘렸을 때 → 하단에 고정
        bar.style.position = 'fixed';
        bar.style.bottom   = '0';
        bar.style.left     = wrapRect.left + 'px';
        bar.style.width    = wrapRect.width + 'px';
        bar.style.display  = 'block';
        bar.style.zIndex   = '999';
      } else {
        // 테이블 전체가 보일 때 → 일반 흐름
        bar.style.position = 'static';
        bar.style.width    = '100%';
        bar.style.display  = wrapRect.bottom <= 0 ? 'none' : 'block';
        bar.style.zIndex   = '';
      }
    }

    window.addEventListener('scroll', updateBarPosition, {passive: true});
    window.addEventListener('resize', updateBarPosition, {passive: true});
    updateBarPosition();
  });
}

function sortCampTable(key) {
  if (campTableSort.key === key) {
    campTableSort.asc = !campTableSort.asc;
  } else {
    campTableSort.key = key;
    campTableSort.asc = false;
  }
  renderCampaignTable();
}

function sortArrow(key, sortState) {
  if (sortState.key !== key) return ' <span style="opacity:.3">↕</span>';
  return sortState.asc ? ' <span>↑</span>' : ' <span>↓</span>';
}

// 증감 화살표 + % 헬퍼
function changeArrow(curr, prev, type) {
  if (!prev || prev === 0) return '';
  var diff = curr - prev;
  if (diff === 0) return '';
  var isUp = diff > 0;
  var color = isUp ? '#16a34a' : '#dc2626';
  var arrow = isUp ? '▲' : '▼';
  var absDiff = Math.abs(diff);
  var label = fmt(absDiff, type || 'num');
  return '<br><span style="font-size:9px;color:' + color + ';font-weight:600">' + arrow + label + '</span>';
}

function filterChTabs() {
  var bk = brandKeys();
  var tabs = document.querySelectorAll('#chTabs .tab');
  for (var i = 0; i < tabs.length; i++) {
    var ch = tabs[i].getAttribute('data-ch');
    if (ch === 'all') continue;
    // 해당 채널에 데이터가 있는지 확인
    var hasData = false;
    for (var bi = 0; bi < bk.length; bi++) {
      var d = RAW[bk[bi]] && RAW[bk[bi]][ch];
      if (d && (d.impressions > 0 || d.conversions > 0)) { hasData = true; break; }
    }
    tabs[i].style.display = hasData ? '' : 'none';
    // 선택된 탭이 숨겨지면 '전체'로 리셋
    if (!hasData && tabs[i].classList.contains('active')) {
      tabs[i].classList.remove('active');
      S.ch = ['all'];
      document.querySelector('#chTabs .tab[data-ch="all"]').classList.add('active');
    }
  }
}

function buildProductTabs(rows) {
  var products = {};
  for (var i = 0; i < rows.length; i++) {
    var p = (rows[i]['제품'] || '').trim();
    if (p) products[p] = true;
  }

  function makeTabHtml(prods, color, groupKey) {
    var html = '<button class="tab" data-group="' + groupKey + '" data-product="__all__' + groupKey + '" onclick="setProductGroupAll(this)">'
      + '<span class="dot" style="background:' + color + ';opacity:.4"></span>전체</button>';
    for (var i = 0; i < prods.length; i++) {
      if (!products[prods[i]]) continue;
      html += '<button class="tab" data-group="' + groupKey + '" data-product="' + prods[i] + '" onclick="setProduct(this)">'
        + '<span class="dot" style="background:' + color + '"></span>' + prods[i] + '</button>';
    }
    return html;
  }

  var mainEl    = document.getElementById('productTabsMain');
  var etcEl     = document.getElementById('productTabsEtc');
  var commonEl  = document.getElementById('productTabsCommon');

  if (mainEl)   mainEl.innerHTML   = makeTabHtml(PRODUCT_GROUPS['메인제품'], '#4f8ef7', 'main');
  if (etcEl)    etcEl.innerHTML    = makeTabHtml(PRODUCT_GROUPS['기타제품'], '#1D9E75', 'etc');
  if (commonEl) {
    // 공통 + 그룹에 없는 것도 공통 행에 표시
    var commonProds = PRODUCT_GROUPS['공통'].slice();
    var allGrouped = PRODUCT_GROUPS['메인제품'].concat(PRODUCT_GROUPS['기타제품']).concat(PRODUCT_GROUPS['공통']);
    Object.keys(products).forEach(function(p) {
      if (allGrouped.indexOf(p) === -1) commonProds.push(p);
    });
    commonEl.innerHTML = makeTabHtml(commonProds, '#888780', 'common');
  }

  // 전체 선택 상태 초기화 (아무것도 선택 안 된 상태 = 전체)
  syncProductTabActive();

function buildProdColDropdown() {
  var html = '';
  for (var i = 0; i < TABLE_COLS.length; i++) {
    var col = TABLE_COLS[i];
    var active = prodSelectedCols.indexOf(col.key) !== -1;
    html += '<div class="col-item ' + (active ? 'col-active' : '') + '" data-k="' + col.key + '" onclick="event.stopPropagation();toggleProdCol(this.dataset.k)">';
    html += '<div class="col-check"></div>' + col.label + '</div>';
  }

}

function toggleProdColDrop() {
  var dd = document.getElementById('prodColDropdown');
  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
}

function toggleProdCol(key) {
  var idx = prodSelectedCols.indexOf(key);
  if (idx !== -1) {
    if (prodSelectedCols.length <= 1) return;
    prodSelectedCols.splice(idx, 1);
  } else {
    prodSelectedCols.push(key);
    prodSelectedCols.sort(function(a, b) {
      var ai = TABLE_COLS.findIndex(function(c){ return c.key === a; });
      var bi = TABLE_COLS.findIndex(function(c){ return c.key === b; });
      return ai - bi;
    });
  }
  buildProdColDropdown();
  renderProductTable();
}

function sortProdTable(key) {
  if (prodTableSort.key === key) { prodTableSort.asc = !prodTableSort.asc; }
  else { prodTableSort.key = key; prodTableSort.asc = false; }
  renderProductTable();
}

function renderProductTable() {
  var rows = sheetsCache.aimban ? (sheetsCache.aimban._filteredNSA || sheetsCache.aimban._rawNSA || []) : [];
  var dateFrom = document.getElementById('dateFrom').value;
  var dateTo   = document.getElementById('dateTo').value;

  var PROD_COLS = TABLE_COLS.filter(function(c){ return prodSelectedCols.indexOf(c.key) !== -1; });
  buildProdColDropdown();

  var thBase = 'padding:9px 14px;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border2);background:var(--bg3);white-space:nowrap;cursor:pointer;user-select:none';
  var headHtml = '<th style="' + thBase + ';text-align:left" onclick="sortProdTable(this.dataset.k)" data-k="name">제품' + sortArrow('name', prodTableSort) + '</th>';
  for (var i = 0; i < PROD_COLS.length; i++) {
    headHtml += '<th style="' + thBase + ';text-align:right" onclick="sortProdTable(this.dataset.k)" data-k="' + PROD_COLS[i].key + '">' + PROD_COLS[i].label + sortArrow(PROD_COLS[i].key, prodTableSort) + '</th>';
  }
  var EXTRA = [
    {key:'conversions', label:'구매완료수',   type:'num'},
    {key:'cart_conv',   label:'장바구니수',   type:'num'},
    {key:'revenue',     label:'구매완료매출', type:'won'},
    {key:'cart_rev',    label:'장바구니매출', type:'won'},
    {key:'total_conv',  label:'총전환수',     type:'num'},
    {key:'total_rev',   label:'총매출',       type:'won'},
    {key:'total_cpa',   label:'총CPA',        type:'cpc'}
  ];
  for (var i = 0; i < EXTRA.length; i++) {
    headHtml += '<th style="' + thBase + ';text-align:right;border-left:' + (i===0 ? '1px solid var(--border2)' : 'none') + '">' + EXTRA[i].label + '</th>';
  }
  document.getElementById('prodTableHead').innerHTML = headHtml;

  var prodMap = {};
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var dateStr = (r['일자'] || '').slice(0, 10);
    if (!dateStr || dateStr < dateFrom || dateStr > dateTo) continue;
    var prod = (r['제품'] || '').trim() || '(미분류)';
    if (!prodMap[prod]) prodMap[prod] = {name:prod, cost:0, impressions:0, clicks:0, conversions:0, revenue:0, cart_conv:0, cart_rev:0};
    prodMap[prod].cost        += Number(r['총비용(vat-)'])     || 0;
    prodMap[prod].impressions += Number(r['노출수'])            || 0;
    prodMap[prod].clicks      += Number(r['클릭수'])            || 0;
    prodMap[prod].conversions += Number(r['구매완료 전환수'])    || 0;
    prodMap[prod].revenue     += Number(r['구매완료 매출액'])    || 0;
    prodMap[prod].cart_conv   += Number(r['장바구니 전환수'])    || 0;
    prodMap[prod].cart_rev    += Number(r['장바구니 매출액'])    || 0;
  }

  var allRows = Object.values(prodMap).filter(function(r){ return r.impressions > 0 || r.conversions > 0; });
  allRows.sort(function(a, b) {
    var da = calcExtended(a), db = calcExtended(b);
    var av = prodTableSort.key === 'name' ? a.name : (da[prodTableSort.key] || 0);
    var bv = prodTableSort.key === 'name' ? b.name : (db[prodTableSort.key] || 0);
    if (av < bv) return prodTableSort.asc ? -1 : 1;
    if (av > bv) return prodTableSort.asc ? 1 : -1;
    return 0;
  });

  if (allRows.length === 0) {
    document.getElementById('prodTbody').innerHTML = '<tr><td colspan="20" style="padding:20px;text-align:center;color:var(--muted);font-size:12px">데이터가 없어요</td></tr>';
    return;
  }

  var html = '';
  var total = {cost:0, impressions:0, clicks:0, conversions:0, revenue:0, cart_conv:0, cart_rev:0};
  for (var i = 0; i < allRows.length; i++) {
    var r = allRows[i];
    var d = calcExtended(r);
    total.cost += r.cost; total.impressions += r.impressions; total.clicks += r.clicks;
    total.conversions += r.conversions; total.revenue += r.revenue;
    total.cart_conv += (r.cart_conv||0); total.cart_rev += (r.cart_rev||0);
    html += '<tr style="border-bottom:' + (prodPrevMode ? 'none' : '1px solid var(--border)') + '">';
    html += '<td style="padding:10px 14px;font-size:12px;color:var(--text);white-space:nowrap;position:sticky;left:0;background:var(--bg2);z-index:1">' + r.name + '</td>';
    for (var j = 0; j < PROD_COLS.length; j++) {
      html += '<td style="padding:8px 14px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums;color:var(--text)">' + fmt(d[PROD_COLS[j].key], PROD_COLS[j].type) + '</td>';
    }
    for (var j = 0; j < EXTRA.length; j++) {
      html += '<td style="padding:8px 14px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums;color:var(--text);border-left:' + (j===0 ? '1px solid var(--border2)' : 'none') + '">' + fmt(d[EXTRA[j].key], EXTRA[j].type) + '</td>';
    }
    html += '</tr>';
    if (prodPrevMode) {
      var prevRange = getPrevRange(dateFrom, dateTo);
      var prevProdMap = {};
      for (var pi = 0; pi < rows.length; pi++) {
        var pr = rows[pi];
        var pDateStr = (pr['일자'] || '').slice(0, 10);
        if (!pDateStr || pDateStr < prevRange.from || pDateStr > prevRange.to) continue;
        var pprod = (pr['제품'] || '').trim() || '(미분류)';
        if (pprod !== r.name) continue;
        if (!prevProdMap[pprod]) prevProdMap[pprod] = {name:pprod, cost:0, impressions:0, clicks:0, conversions:0, revenue:0, cart_conv:0, cart_rev:0};
        prevProdMap[pprod].cost        += Number(pr['총비용(vat-)'])     || 0;
        prevProdMap[pprod].impressions += Number(pr['노출수'])            || 0;
        prevProdMap[pprod].clicks      += Number(pr['클릭수'])            || 0;
        prevProdMap[pprod].conversions += Number(pr['구매완료 전환수'])    || 0;
        prevProdMap[pprod].revenue     += Number(pr['구매완료 매출액'])    || 0;
        prevProdMap[pprod].cart_conv   += Number(pr['장바구니 전환수'])    || 0;
        prevProdMap[pprod].cart_rev    += Number(pr['장바구니 매출액'])    || 0;
      }
      var pd = prevProdMap[r.name] ? calcExtended(prevProdMap[r.name]) : calcExtended({cost:0,impressions:0,clicks:0,conversions:0,revenue:0,cart_conv:0,cart_rev:0});
      html += '<tr style="border-bottom:1px solid var(--border);background:rgba(59,125,246,0.07)">';
      html += '<td style="padding:3px 14px 6px 18px;font-size:10px;color:#3b7de9;font-weight:500;white-space:nowrap;position:sticky;left:0;background:rgba(235,241,255,0.97);z-index:1">↳ 이전 동기간</td>';
      for (var j = 0; j < PROD_COLS.length; j++) {
        html += '<td style="padding:3px 14px 6px;text-align:right;font-size:11px;font-variant-numeric:tabular-nums;color:#374151">' + fmt(pd[PROD_COLS[j].key], PROD_COLS[j].type) + changeArrow(d[PROD_COLS[j].key], pd[PROD_COLS[j].key], PROD_COLS[j].type) + '</td>';
      }
      for (var j = 0; j < EXTRA.length; j++) {
        html += '<td style="padding:3px 14px 6px;text-align:right;font-size:11px;font-variant-numeric:tabular-nums;color:#374151;border-left:' + (j===0 ? '1px solid var(--border2)' : 'none') + '">' + fmt(pd[EXTRA[j].key], EXTRA[j].type) + changeArrow(d[EXTRA[j].key], pd[EXTRA[j].key], EXTRA[j].type) + '</td>';
      }
      html += '</tr>';
    }
  }
  if (allRows.length > 1) {
    var tc = calcExtended(total);
    html += '<tr style="border-top:2px solid var(--border2);background:var(--bg3)">';
    html += '<td style="padding:10px 14px;font-size:12px;font-weight:600">합계</td>';
    for (var j = 0; j < PROD_COLS.length; j++) {
      html += '<td style="padding:10px 14px;text-align:right;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums">' + fmt(tc[PROD_COLS[j].key], PROD_COLS[j].type) + '</td>';
    }
    for (var j = 0; j < EXTRA.length; j++) {
      html += '<td style="padding:10px 14px;text-align:right;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;border-left:' + (j===0 ? '1px solid var(--border2)' : 'none') + '">' + fmt(tc[EXTRA[j].key], EXTRA[j].type) + '</td>';
    }
    html += '</tr>';
  }
  document.getElementById('prodTbody').innerHTML = html;
}


buildMetricSelector();
buildColDropdown();
restoreDateRange();
loadMemos();
renderWithData();
</script>
</body>
</html>
